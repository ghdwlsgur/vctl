name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version: "1.26.5"
          cache: true

      - name: Set release version
        run: echo "RELEASE_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Run tests
        run: go test ./...

      - name: Run Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Build distroless image for scan
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          platforms: linux/amd64
          load: true
          build-args: |
            VERSION=${{ env.RELEASE_VERSION }}
          tags: vctl:release-scan

      - name: Scan distroless image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: vctl:release-scan
          scanners: vuln
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - name: Release
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish distroless image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ env.RELEASE_VERSION }}
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:${{ env.RELEASE_VERSION }}
            ghcr.io/${{ github.repository }}:latest

  chocolatey:
    name: Chocolatey
    if: startsWith(github.ref, 'refs/tags/v')
    needs: goreleaser
    runs-on: windows-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CHOCOLATEY_API_KEY: ${{ secrets.CHOCOLATEY_API_KEY }}
    steps:
      - name: Check out
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Download release checksums
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME.TrimStart('v')
          New-Item -ItemType Directory -Force dist | Out-Null
          gh release download $env:GITHUB_REF_NAME --pattern checksums.txt --dir dist
          $archive = "vctl_${version}_windows_amd64.zip"
          $line = Get-Content dist/checksums.txt | Where-Object { $_ -match "  $([regex]::Escape($archive))$" }
          if (-not $line) { throw "checksum not found for $archive" }
          $checksum = ($line -split '\s+')[0]
          "RELEASE_VERSION=$version" >> $env:GITHUB_ENV
          "WINDOWS_AMD64_CHECKSUM=$checksum" >> $env:GITHUB_ENV

      - name: Pack Chocolatey package
        shell: pwsh
        run: ./deploy/chocolatey/pack.ps1 -Version $env:RELEASE_VERSION -Checksum64 $env:WINDOWS_AMD64_CHECKSUM -OutputDirectory dist/chocolatey

      - name: Verify Chocolatey install
        shell: pwsh
        run: |
          choco install vctl --source "$(Resolve-Path dist/chocolatey)" --version $env:RELEASE_VERSION --yes --no-progress
          vctl --version
          choco uninstall vctl --yes --no-progress

      - name: Attach package to GitHub release
        shell: pwsh
        run: gh release upload $env:GITHUB_REF_NAME (Get-ChildItem dist/chocolatey/*.nupkg).FullName --clobber

      - name: Publish to Chocolatey Community Repository
        if: env.CHOCOLATEY_API_KEY != ''
        shell: pwsh
        run: choco push (Get-ChildItem dist/chocolatey/*.nupkg).FullName --source https://push.chocolatey.org/ --api-key $env:CHOCOLATEY_API_KEY
