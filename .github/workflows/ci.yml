name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  security-events: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version: "1.26.5"
          cache: true

      - name: Check formatting
        run: |
          unformatted="$(find . -name '*.go' -not -path './vendor/*' -print0 | xargs -0 gofmt -l)"
          test -z "$unformatted"

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build
        run: go build ./cmd/vctl

  integration:
    name: Store Integration
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: vctl
          POSTGRES_PASSWORD: vctl
          POSTGRES_DB: vctl_test
        ports:
          - 5432:5432
        # Gate the test step on Postgres actually accepting connections.
        options: >-
          --health-cmd "pg_isready -U vctl -d vctl_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Check out
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version: "1.26.5"
          cache: true

      # internal/store integration tests skip themselves unless VCTL_TEST_DSN is
      # set; point them at the service container so migrations and queries run
      # for real instead of being silently skipped.
      - name: Store integration tests
        env:
          VCTL_TEST_DSN: postgres://vctl:vctl@localhost:5432/vctl_test?sslmode=disable
        run: go test -v -count=1 ./internal/store/...

  windows:
    name: Windows Build
    runs-on: windows-latest
    steps:
      - name: Check out
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version: "1.26.5"
          cache: true

      - name: Build Windows CLI
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          go build -trimpath -o dist/vctl.exe ./cmd/vctl
          & ./dist/vctl.exe --version

  trivy:
    name: Trivy
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Run Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          scan-type: fs
          scan-ref: .
          trivyignores: .trivyignore
          scanners: vuln,secret,misconfig
          severity: CRITICAL,HIGH,MEDIUM,LOW
          exit-code: "1"
          ignore-unfixed: true

  image:
    name: Container Image
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Build distroless image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          platforms: linux/amd64
          load: true
          build-args: |
            VERSION=ci
          tags: vctl:ci

      - name: Scan distroless image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: vctl:ci
          scanners: vuln
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
