name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  security-events: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"
          cache: true

      - name: Check formatting
        run: test -z "$(gofmt -l $(find . -name '*.go' -not -path './vendor/*'))"

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build
        run: go build ./cmd/vctl

  trivy:
    name: Trivy
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Run Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: CRITICAL,HIGH,MEDIUM,LOW
          exit-code: "1"
          ignore-unfixed: true

  image:
    name: Container Image
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build distroless image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          load: true
          build-args: |
            VERSION=ci
          tags: vctl:ci

      - name: Scan distroless image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: vctl:ci
          scanners: vuln
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
