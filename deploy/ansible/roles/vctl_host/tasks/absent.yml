---
- name: Disable services
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: false
    state: stopped
  loop:
    - vctl-collect
    - vctl-watch-sessions
    - vctl-node-agent
  failed_when: false

- name: Remove installed files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/systemd/system/vctl-collect.service
    - /etc/systemd/system/vctl-watch-sessions.service
    - /etc/systemd/system/vctl-node-agent.service
    - /etc/systemd/system/vctl-node-agent.service.d/10-hostname.conf
    - /etc/logrotate.d/vctl-audit
    - /etc/systemd/journald.conf.d/vctl-audit.conf
    - /usr/local/sbin/pam-session-stamp.sh
    - /etc/profile.d/vctl-session-stamp.sh
  notify: daemon-reload

- name: Remove ExposeAuthInfo
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^ExposeAuthInfo'
    state: absent
    validate: "sshd -t -f %s"
  notify: reload sshd

- name: Remove PAM stamper hook
  ansible.builtin.lineinfile:
    path: /etc/pam.d/sshd
    regexp: 'pam-session-stamp\.sh'
    state: absent
