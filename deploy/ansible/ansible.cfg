[defaults]
inventory = inventory/hosts.ini
roles_path = roles
host_key_checking = True
retry_files_enabled = False
# Built-in default callback with YAML output (the community.general.yaml callback
# was removed in community.general 12); result_format works on ansible-core >= 2.13.
result_format = yaml
interpreter_python = auto_silent

[ssh_connection]
pipelining = True
