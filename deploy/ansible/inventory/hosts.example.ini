# Example inventory. Copy to hosts.ini (gitignored) and fill with real hosts.
# ansible inventory_hostname MUST equal the vctl inventory hostname (node-agent
# reports under it). IPs below are documentation-only (RFC 5737) — not real.

[seoul_onprem]
sre-srv-0001 ansible_host=192.0.2.11
sre-srv-0002 ansible_host=192.0.2.12

[incheon_onprem]
incheon-gpu01 ansible_host=198.51.100.14

[seoul_onprem:vars]
ansible_user=root
# LB fronting *.sre.local for this network (kept out of the repo — set the real IP here).
vctl_host_sre_lb_ip=192.0.2.1

[incheon_onprem:vars]
ansible_user=root
vctl_host_sre_lb_ip=198.51.100.1
# bare-metal GPU nodes: systemd Tetragon ok; k8s nodes -> vctl_host_install_tetragon=false + DaemonSet

[all:vars]
ansible_ssh_private_key_file=~/.ssh/id_rsa
