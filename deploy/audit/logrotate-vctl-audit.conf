# /etc/logrotate.d/vctl-audit
#
# The collector and session registrar log to journald by default (capped via the
# journald drop-in). This handles any FILE-based logs — e.g. if you run the
# collector with a local buffer file, or if Tetragon is configured to export to
# a file instead of the gRPC stream.
#
# Note: kernel events themselves live in central Postgres and are pruned by
# `vctl prune` (CronJob) — this rotates only on-host operational logs.

/var/log/vctl/*.log {
    daily
    rotate 7
    maxsize 100M
    missingok
    notifempty
    compress
    delaycompress
    copytruncate
    su root root
}

# If Tetragon exports to a file (rather than the live `tetra getevents` stream),
# prefer Tetragon's built-in rotation flags over logrotate:
#   --export-filename /var/log/tetragon/tetragon.log
#   --export-file-max-size-mb 100 --export-file-max-backups 5 --export-file-compress
# Otherwise rotate it here too:
/var/log/tetragon/*.log {
    daily
    rotate 5
    maxsize 200M
    missingok
    notifempty
    compress
    delaycompress
    copytruncate
    su root root
}
