# Daily kernel-audit retention. Runs `vctl prune` with config defaults
# (kernel_retention_days / session_retention_days). Mirrors Teleport's model:
# structured rows live in the DB, a lifecycle job enforces retention.
#
# Needs: vctl image + AppRole creds (vctl-pruner) in secret `vctl-prune-approle`.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: vctl-audit-prune
  namespace: vctl
spec:
  schedule: "17 3 * * *" # daily 03:17
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 600
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      activeDeadlineSeconds: 1800
      backoffLimit: 2
      template:
        spec:
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            fsGroup: 65532
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: prune
              # Pin to a release tag; pull from the internal trusted registry.
              image: harbor.sre.local/sre/vctl:v0.1.14
              args: ["prune"]
              env:
                - name: VCTL_AUTH_METHOD
                  value: approle
                - name: VCTL_ROLE_ID_FILE
                  value: /etc/vctl/role-id
                - name: VCTL_SECRET_ID_FILE
                  value: /etc/vctl/secret-id
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                capabilities:
                  drop: ["ALL"]
                seccompProfile:
                  type: RuntimeDefault
              resources:
                requests:
                  cpu: 25m
                  memory: 32Mi
                limits:
                  cpu: 200m
                  memory: 128Mi
              volumeMounts:
                - name: approle
                  mountPath: /etc/vctl
                  readOnly: true
                - name: state
                  mountPath: /home/nonroot/.vctl
          volumes:
            - name: approle
              secret:
                secretName: vctl-prune-approle
            - name: state
              emptyDir: {}
