# /etc/systemd/journald.conf.d/vctl-audit.conf
#
# Bound journald growth from the audit daemons (collector + session registrar),
# which can be chatty under load. journald is the default sink for the systemd
# units also set per-unit LogRateLimit* values. This file caps total persistent
# journal use and retention so a busy host can't fill the disk. (The audit data
# of record lives in central Postgres.)
[Journal]
SystemMaxUse=100M
SystemKeepFree=1G
MaxRetentionSec=7day
MaxFileSec=1day
RateLimitIntervalSec=30s
RateLimitBurst=2000
