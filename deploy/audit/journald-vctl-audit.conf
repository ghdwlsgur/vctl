# /etc/systemd/journald.conf.d/vctl-audit.conf
#
# Bound journald growth from the audit daemons (collector + session registrar),
# which can be chatty under load. journald is the default sink for the systemd
# units; this caps total persistent journal use and retention so a busy host
# can't fill the disk. (The audit data of record lives in central Postgres.)
[Journal]
SystemMaxUse=500M
SystemKeepFree=1G
MaxRetentionSec=2week
MaxFileSec=1day
RateLimitIntervalSec=30s
RateLimitBurst=10000
