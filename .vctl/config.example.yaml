# vctl optional overrides.
#
# vctl ships with compiled defaults for this environment and WORKS WITHOUT THIS
# FILE. Copy to .vctl/config.yaml only to change something below; omit the rest
# and the defaults apply. No secrets here — Vault issues tokens and DB
# credentials at runtime; nothing is stored in this file, and it is not
# auto-generated at login.
#
# Full key list + their defaults: see the README "Configuration" section.

# People log in with GitLab SSO (per-person identity). Compiled default is
# userpass; set this so `vctl login` uses OIDC without --method.
auth_method: oidc

# Default SSH login user when an inventory host doesn't specify one.
# ssh_default_user: ubuntu

# Override ONLY if your workstation can't resolve/reach the default DB endpoint
# (e.g. dialing through a port-forward where the dial host != the cert name).
# db_host: vctl-postgres.sre.local
# db_server_name: vctl-postgres.sre.local

# Workstation auto-auth (skip repeated logins): point at approle credential
# files. Usually `vctl login --method oidc` is simpler.
# role_id_file: /home/you/.vctl/role-id
# secret_id_file: /home/you/.vctl/secret-id
